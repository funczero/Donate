name: Donate CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22.x

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Display Node & npm versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Security audit (critical production only)
        run: npm audit --production --audit-level=critical || true

      - name: Run ESLint (if present)
        run: npm run lint --if-present

      - name: Build Project (if present)
        run: npm run build --if-present

  deploy:
    name: Deploy Square Cloud
    needs: quality
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    environment:
      name: production

    env:
      APP_ID: ${{ secrets.SQUARE_DONATE_APP_ID }}
      TOKEN: ${{ secrets.SQUARE_DONATE_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        run: |
          if [ -z "$APP_ID" ] || [ -z "$TOKEN" ]; then
            echo "::error::APP_ID or TOKEN is empty."
            exit 1
          fi

      - name: Print deployment info
        run: |
          echo "Deploying commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"

      - name: Create deployment archive
        run: |
          set -euo pipefail

          zip -r app.zip . \
            -x "*.git*" \
            ".github/*" \
            "node_modules/*" \
            ".env*" \
            "*.md" \
            ".gitignore"

      - name: Validate package size
        run: |
          SIZE=$(stat -c%s app.zip)
          echo "Package size: $SIZE bytes"

          if [ $SIZE -lt 1000 ]; then
            echo "Package too small, aborting deploy."
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: donate-production
          path: app.zip
          retention-days: 7

      - name: Upload application
        run: |
          curl --fail --show-error --retry 3 --retry-delay 5 \
            -X POST "https://api.squarecloud.app/v2/apps/$APP_ID/commit" \
            -H "Authorization: $TOKEN" \
            -F "file=@app.zip"

      - name: Wait deployment sync
        run: sleep 10

      - name: Restart application
        run: |
          curl --fail --show-error --retry 3 --retry-delay 5 \
            -X POST "https://api.squarecloud.app/v2/apps/$APP_ID/restart" \
            -H "Authorization: $TOKEN"

      - name: Deployment success summary
        run: |
          echo "### Deployment successful!" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
