name: Discord Webhook

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: webhook-${{ github.ref }}
  cancel-in-progress: true

jobs:
  notify:
    name: Send Discord Notification
    runs-on: ubuntu-latest

    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

    steps:
      - name: Send webhook notification
        env:
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -e

          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)

          COMMIT_URL="https://github.com/$REPOSITORY/commit/$COMMIT_SHA"
          AUTHOR_URL="https://github.com/$ACTOR"
          AUTHOR_AVATAR="https://github.com/$ACTOR.png"

          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          PAYLOAD=$(jq -n \
            --arg actor "$ACTOR" \
            --arg author_url "$AUTHOR_URL" \
            --arg author_avatar "$AUTHOR_AVATAR" \
            --arg commit_url "$COMMIT_URL" \
            --arg repository "$REPOSITORY" \
            --arg branch "$BRANCH" \
            --arg message "$COMMIT_MESSAGE" \
            --arg short_sha "$SHORT_SHA" \
            --arg timestamp "$TIMESTAMP" \
            '{
              username: "GitHub Actions",
              avatar_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
              embeds: [
                {
                  color: 5763719,
                  author: {
                    name: $actor,
                    icon_url: $author_avatar,
                    url: $author_url
                  },
                  title: "New Commit Pushed",
                  url: $commit_url,
                  description: $message,
                  fields: [
                    {
                      name: "Environment",
                      value: "`Production`",
                      inline: true
                    },
                    {
                      name: "Branch",
                      value: ("`" + $branch + "`"),
                      inline: true
                    },
                    {
                      name: "Commit",
                      value: ("[`" + $short_sha + "`](" + $commit_url + ")"),
                      inline: true
                    },
                    {
                      name: "Repository",
                      value: ("`" + $repository + "`"),
                      inline: false
                    }
                  ],
                  footer: {
                    text: "Donate CI/CD"
                  },
                  timestamp: $timestamp
                }
              ]
            }')

          curl --fail --silent --show-error \
            -H "Content-Type: application/json" \
            -X POST \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK"
